<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#142850" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <!-- Primary Meta Tags -->
    <title>University Student Council — ISUFST Dingle Campus</title>
    <meta name="title" content="University Student Council — ISUFST Dingle Campus" />
    <meta name="description" content="Official portal of the ISUFST Dingle Campus University Student Council (USC). Serving students, leading change, and building community." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://usc-attendance.vercel.app/" />
    <meta property="og:title" content="University Student Council — ISUFST Dingle Campus" />
    <meta property="og:description" content="Official portal of the ISUFST Dingle Campus University Student Council (USC). Serving students, leading change, and building community." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://usc-attendance.vercel.app/" />
    <meta property="twitter:title" content="University Student Council — ISUFST Dingle Campus" />
    <meta property="twitter:description" content="Official portal of the ISUFST Dingle Campus University Student Council (USC). Serving students, leading change, and building community." />
    <meta property="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Source+Serif+4:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <!-- Splash Screen -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #142850;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.4s ease-out;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash-logo {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid rgba(201, 162, 75, 0.5);
        box-shadow: 0 0 40px rgba(201, 162, 75, 0.15);
        animation: spin 3s linear infinite;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      #splash-org {
        font-family: 'Source Serif 4', Georgia, serif;
        font-size: 22px;
        font-weight: 600;
        color: #ffffff;
        text-align: center;
        letter-spacing: -0.01em;
      }
      #splash-campus {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
        text-align: center;
      }
      #splash-dots {
        display: flex;
        gap: 6px;
        margin-top: 12px;
      }
      #splash-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #C9A24B;
        animation: pulse 1.2s ease-in-out infinite;
      }
      #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse {
        0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1.2); }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash">
      <img id="splash-logo" src="/logo/USC_logo.jpg" alt="USC Logo" />
      <div id="splash-org">University Student Council</div>
      <div id="splash-campus">ISUFST Dingle Campus</div>
      <div id="splash-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
